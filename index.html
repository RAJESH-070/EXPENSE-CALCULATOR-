<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Based Student Expense Calculator</title>
    <meta name="description" content="A premium, dynamic monthly expense tracker for students.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Phosphor Icons for premium look -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>
<main class="container">
    <header>
        <h1>Based<span class="highlight">Tracker</span></h1>
        <p>Student Monthly Expense Calculator</p>
    </header>

    <section class="dashboard">
        <div class="card glass">
            <div class="card-icon"><i class="ph ph-wallet"></i></div>
                <div class="card-info" style="flex: 1;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <h3>Budget</h3>
                        <button id="edit-budget-btn" class="text-btn" aria-label="Edit Budget">
                            <i class="ph ph-pencil-simple"></i> Edit
                        </button>
                    </div>
                    <h2 id="budget-display">₹0.00</h2>
                </div>
        </div>
        <div class="card glass">
            <div class="card-icon"><i class="ph ph-trend-down"></i></div>
            <div class="card-info">
                <h3>Spent</h3>
                <h2 id="spent-display">₹0.00</h2>
            </div>
        </div>
        <div class="card glass">
            <div class="card-icon"><i class="ph ph-piggy-bank"></i></div>
            <div class="card-info">
                <h3>Remaining</h3>
                <h2 id="remaining-display" class="safe">₹0.00</h2>
            </div>
        </div>
    </section>

    <section class="progress-section glass">
        <div class="progress-header">
            <span>Budget Usage</span>
            <span id="progress-text">0%</span>
        </div>
        <div class="progress-bar-container">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
    </section>

    <div class="content-grid">
        <section class="add-expense glass">
            <h2><i class="ph ph-plus-circle"></i> Add Expense</h2>
            <form id="expense-form">
                <div class="input-group">
                    <label for="expense-name">What did you buy?</label>
                    <input type="text" id="expense-name" placeholder="e.g., Midnight Pizza" required>
                </div>
                <div class="input-group">
                    <label for="expense-amount">How much?</label>
                    <div class="amount-wrapper">
                        <span class="currency-symbol">₹</span>
                        <input type="number" id="expense-amount" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                </div>
                <div class="input-group">
                    <label for="expense-category">Category</label>
                    <select id="expense-category" required>
                        <option value="" disabled selected>Select category...</option>
                        <option value="food">🍔 Food & Dining</option>
                        <option value="transport">🚌 Transportation</option>
                        <option value="supplies">📚 Books & Supplies</option>
                        <option value="entertainment">🎮 Entertainment</option>
                        <option value="bills">💡 Bills & Utilities</option>
                        <option value="other">✨ Other</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary">Add Expense</button>
            </form>
        </section>

        <section class="expense-list-section glass">
            <h2><i class="ph ph-list-dashes"></i> Recent Expenses</h2>
            <div class="list-container">
                <ul id="expense-list">
                    <!-- Expenses injected here -->
                </ul>
                <div id="empty-state" class="empty-state">
                    <i class="ph ph-ghost"></i>
                    <p>No expenses yet. You're doing great!</p>
                </div>
            </div>
        </section>
    </div>
</main>

<!-- Budget Modal -->
<div id="budget-modal" class="modal-overlay">
    <div class="modal glass">
        <h2>Set Monthly Budget</h2>
        <p>How much paper are we working with this month?</p>
        <form id="budget-form">
            <div class="input-group">
                <div class="amount-wrapper">
                    <span class="currency-symbol">₹</span>
                    <input type="number" id="budget-input" placeholder="0.00" step="0.01" min="0" required>
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" id="cancel-budget" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Save Budget</button>
            </div>
        </form>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
